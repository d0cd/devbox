# CI: build, lint, and test devbox container images.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  test-shell:
    name: Test shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache BATS
        id: cache-bats
        uses: actions/cache@v4
        with:
          path: /tmp/bats
          key: bats-1.11.1-${{ hashFiles('tests/bats/**', '.github/workflows/ci.yml') }}
      - name: Install BATS
        run: |
          if [ ! -d /tmp/bats ]; then
            git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats
          fi
          sudo /tmp/bats/install.sh /usr/local
      - name: Run BATS tests
        run: bats tests/bats/

  test-python:
    name: Test Python modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Run pytest
        run: uv run --with pytest --with pyyaml --with mitmproxy pytest tests/pytest/ -v

  build-images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [lint, test-shell, test-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build proxy image
        uses: docker/build-push-action@v6
        with:
          context: ./proxy
          load: true
          tags: devbox-proxy:ci
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,scope=proxy,mode=max

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: devbox-agent:ci
          cache-from: type=gha,scope=agent
          cache-to: type=gha,scope=agent,mode=max

      - name: Save images as artifacts
        run: |
          docker save devbox-proxy:ci devbox-agent:ci | gzip > /tmp/devbox-images.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devbox-images
          path: /tmp/devbox-images.tar.gz
          retention-days: 3

  scan-images:
    name: Scan container images
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: devbox-images
          path: /tmp
      - name: Load images
        run: gunzip -c /tmp/devbox-images.tar.gz | docker load
      - name: Scan proxy image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'devbox-proxy:ci'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
          scanners: 'vuln'
          trivyignores: '.trivyignore'
      - name: Scan agent image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'devbox-agent:ci'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
          scanners: 'vuln'
          trivyignores: '.trivyignore'
      # Audit scan WITHOUT ignores — informational only.
      # When this stops finding issues, the .trivyignore entries can be removed.
      - name: Audit ignored CVEs (informational)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'devbox-agent:ci'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
          scanners: 'vuln'
      # npm audit — catches known vulnerabilities in AI CLI tools
      # (claude-code, opencode, gemini-cli, codex, etc.).
      - name: npm audit (agent image)
        continue-on-error: true
        run: |
          docker run --rm --entrypoint "" devbox-agent:ci \
            bash -c "npm audit --omit=dev 2>&1 || true"

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: devbox-images
          path: /tmp
      - name: Load images
        run: |
          gunzip -c /tmp/devbox-images.tar.gz | docker load
          docker tag devbox-proxy:ci devbox-proxy:latest
          docker tag devbox-agent:ci devbox-agent:latest

      - name: Start proxy and verify enforcer
        run: |
          # Start proxy with default policy.
          docker run -d --name devbox-proxy-test \
            -v "$PWD/templates/policy.yml:/proxy/policy.yml:ro" \
            -p 8080:8080 \
            devbox-proxy:latest

          # Wait for proxy to be ready (TCP check — mitmproxy doesn't serve direct HTTP).
          PROXY_READY=false
          for i in $(seq 1 20); do
            if python3 -c "import socket; socket.create_connection(('localhost', 8080), timeout=1)" 2>/dev/null; then
              PROXY_READY=true
              break
            fi
            sleep 1
          done
          if [ "$PROXY_READY" != "true" ]; then
            echo "FAIL: Proxy did not become ready after 20s"
            docker logs devbox-proxy-test
            exit 1
          fi

          # Test: allowed domain should not get 403 (may get other codes without credentials).
          # Retry with backoff — proxy may still be initializing CA cert after TCP socket is up.
          STATUS="000"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' -x http://localhost:8080 http://api.anthropic.com/ || true)
            [ "$STATUS" != "000" ] && [ -n "$STATUS" ] && break
            sleep 2
          done
          echo "Allowed domain status: $STATUS"
          if [ -z "$STATUS" ] || [ "$STATUS" = "000" ]; then
            echo "FAIL: curl could not connect to proxy"
            docker logs devbox-proxy-test
            exit 1
          fi
          if [ "$STATUS" = "403" ]; then
            echo "FAIL: Allowed domain got 403 — enforcer is blocking incorrectly"
            exit 1
          fi

          # Test: blocked domain should get 403.
          # Retry — the enforcer addon may still be initializing after first request.
          BLOCKED_OK=false
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' -x http://localhost:8080 http://evil.com/ || true)
            echo "Blocked domain attempt $i: $STATUS"
            if [ "$STATUS" = "403" ]; then
              BLOCKED_OK=true
              break
            fi
            sleep 2
          done
          if [ "$BLOCKED_OK" != "true" ]; then
            echo "FAIL: Expected 403 for blocked domain, got $STATUS"
            docker logs devbox-proxy-test
            exit 1
          fi

          # Test: HTTPS CONNECT tunnel — blocked domain should get 403.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --proxy-insecure -x http://localhost:8080 https://evil.com/ || true)
          echo "HTTPS CONNECT blocked domain status: $STATUS"
          if [ "$STATUS" != "403" ] && [ "$STATUS" != "000" ]; then
            # 403 = proxy blocked it, 000 = connection reset (also blocked).
            echo "WARN: Expected 403 or connection reset for HTTPS blocked domain, got $STATUS"
          fi

          # Test: HTTPS CONNECT tunnel — allowed domain should not get 403.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --proxy-insecure -x http://localhost:8080 https://api.anthropic.com/ || true)
          echo "HTTPS CONNECT allowed domain status: $STATUS"
          if [ "$STATUS" = "403" ]; then
            echo "FAIL: HTTPS CONNECT to allowed domain got 403"
            exit 1
          fi

          docker stop devbox-proxy-test
          docker rm devbox-proxy-test

  smoke-test-extended:
    name: Extended smoke test (logger + wildcards)
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: devbox-images
          path: /tmp
      - name: Load images
        run: |
          gunzip -c /tmp/devbox-images.tar.gz | docker load
          docker tag devbox-proxy:ci devbox-proxy:latest
          docker tag devbox-agent:ci devbox-agent:latest
      - name: Run extended smoke test
        run: bash tests/integration/smoke_extended.sh

  test-firewall-real:
    name: Real firewall test
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: devbox-images
          path: /tmp
      - name: Load images
        run: |
          gunzip -c /tmp/devbox-images.tar.gz | docker load
          docker tag devbox-agent:ci devbox-agent:latest
      - name: Run firewall test inside container
        run: |
          docker run --rm --cap-add NET_ADMIN \
            --entrypoint bash \
            -v "$PWD/lib:/usr/local/lib/devbox:ro" \
            -v "$PWD/tests:/tests:ro" \
            devbox-agent:latest /tests/integration/firewall_real.sh

  test-compose:
    name: Compose integration test
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: devbox-images
          path: /tmp
      - name: Load and tag images
        run: |
          gunzip -c /tmp/devbox-images.tar.gz | docker load
          docker tag devbox-proxy:ci devbox-proxy:latest
          docker tag devbox-agent:ci devbox-agent:latest
      - name: Start compose stack
        env:
          PROJECT_PATH: ${{ github.workspace }}
          PROJECT_HASH: ci-test
          DEVBOX_POLICY_FILE: ${{ github.workspace }}/templates/policy.yml
          DEVBOX_LOG_DIR: /tmp/devbox-logs
          DEVBOX_MEMORY_DIR: /tmp/devbox-memory
          DEVBOX_HISTORY_DIR: /tmp/devbox-history
          DEVBOX_SECRETS_FILE: /tmp/devbox-secrets.env
          DEVBOX_PROJECT_SECRETS_FILE: /tmp/devbox-project-secrets.env
          DEVBOX_CONFIG: /tmp/devbox-config
          DEVBOX_PRIVATE_DIR: /tmp/devbox-private
          DEVBOX_CLAUDE_DIR: /tmp/devbox-claude
          DEVBOX_PROJECT_NAME: ci-test
          DEVBOX_PROXY_SECRETS_FILE: /dev/null
          DEVBOX_PHANTOM_FILE: /dev/null
        run: |
          # Create required directories and files.
          mkdir -p /tmp/devbox-logs /tmp/devbox-memory /tmp/devbox-history \
                   /tmp/devbox-config/opencode /tmp/devbox-private /tmp/devbox-claude
          # Make dirs writable by container's devbox user (uid 1000).
          chmod 777 /tmp/devbox-logs /tmp/devbox-claude
          echo "# CI test secrets (no real keys)" > /tmp/devbox-secrets.env
          echo "# CI project secrets" > /tmp/devbox-project-secrets.env
          echo '{}' > /tmp/devbox-config/opencode/opencode.json

          # Start the full stack (proxy + agent).
          # Publish port 8080 for host-side proxy testing.
          printf 'services:\n  proxy:\n    ports:\n      - "8080:8080"\n' > /tmp/compose-ci-override.yml
          docker compose -f docker-compose.yml -f /tmp/compose-ci-override.yml -p devbox-ci up -d

          # Wait for proxy health check.
          TIMEOUT=30
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' devbox-ci-proxy-1 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Proxy healthy after ${ELAPSED}s"
              break
            fi
            sleep 1
            ELAPSED=$((ELAPSED + 1))
          done
          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "FAIL: Proxy did not become healthy after ${TIMEOUT}s"
            docker compose -p devbox-ci logs proxy
            exit 1
          fi

          # Wait for agent to be healthy (firewall active).
          ELAPSED=0
          while [ "$ELAPSED" -lt 60 ]; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' devbox-ci-agent-1 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Agent healthy after ${ELAPSED}s"
              break
            fi
            # Fail fast if agent exited.
            STATE=$(docker inspect --format='{{.State.Status}}' devbox-ci-agent-1 2>/dev/null || echo "unknown")
            if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
              echo "FAIL: Agent container exited"
              docker compose -p devbox-ci logs agent
              exit 1
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done
          if [ "$ELAPSED" -ge 60 ]; then
            echo "FAIL: Agent did not become healthy after 60s"
            docker compose -p devbox-ci logs agent
            exit 1
          fi

          # Verify agent entrypoint completed: firewall active + user-setup.sh ran.
          echo "--- Agent entrypoint verification ---"
          # Check iptables rules are active.
          docker exec devbox-ci-agent-1 iptables -L OUTPUT -n | head -10
          # Check /etc/skel was copied to /home/devbox (read_only rootfs).
          docker exec devbox-ci-agent-1 gosu devbox test -f /home/devbox/.zshrc \
            && echo "OK: .zshrc populated from /etc/skel" \
            || { echo "FAIL: .zshrc not found in /home/devbox"; exit 1; }
          # Check CA cert was installed.
          docker exec devbox-ci-agent-1 test -f /usr/local/share/ca-certificates/mitmproxy-ca.crt \
            && echo "OK: CA cert installed" \
            || { echo "FAIL: CA cert not found"; exit 1; }
          # Check devbox-notify and cmux helpers are available.
          docker exec devbox-ci-agent-1 gosu devbox which devbox-notify \
            && echo "OK: devbox-notify available" \
            || { echo "FAIL: devbox-notify not found"; exit 1; }
          docker exec devbox-ci-agent-1 gosu devbox which devbox-cmux-send \
            && echo "OK: devbox-cmux-send available" \
            || { echo "FAIL: devbox-cmux-send not found"; exit 1; }
          docker exec devbox-ci-agent-1 gosu devbox which devbox-status \
            && echo "OK: devbox-status available" \
            || { echo "FAIL: devbox-status not found"; exit 1; }
          # Check Claude Code hooks config exists.
          docker exec devbox-ci-agent-1 gosu devbox test -f /home/devbox/.claude/settings.json \
            && echo "OK: Claude Code hooks config exists" \
            || { echo "FAIL: Claude Code hooks config not found"; exit 1; }

          # Test: allowed domain should pass through proxy.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -x http://localhost:8080 http://api.anthropic.com/ || true)
          echo "Allowed domain status: $STATUS"
          if [ "$STATUS" = "403" ]; then
            echo "FAIL: Allowed domain blocked"
            exit 1
          fi

          # Test: blocked domain should get 403.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -x http://localhost:8080 http://evil.com/ || true)
          echo "Blocked domain status: $STATUS"
          if [ "$STATUS" != "403" ]; then
            echo "FAIL: Expected 403 for blocked domain, got $STATUS"
            exit 1
          fi

          # Verify API log database was created.
          if [ ! -f /tmp/devbox-logs/api.db ]; then
            echo "FAIL: API log database not created"
            exit 1
          fi

          echo "Compose integration test passed (proxy + agent)"
      - name: Cleanup
        if: always()
        run: docker compose -p devbox-ci down -v 2>/dev/null || true
