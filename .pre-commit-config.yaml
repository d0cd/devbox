repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # SC2046/SC2086: docker compose args intentionally need word splitting (-f file1 -f file2)
        args: ["-e", "SC1091,SC2015,SC2016,SC2034,SC2046,SC2086,SC2119,SC2120,SC2155,SC2317,SC2329"]
        files: \.(sh|bash)$|^devbox$|entrypoint\.sh$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt
        args: ["-i", "4", "-ci", "-bn"]
        files: \.(sh|bash)$|^devbox$|entrypoint\.sh$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        files: Dockerfile$

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy --ignore-missing-imports --disallow-untyped-defs --warn-return-any
        language: python
        language_version: python3.12
        additional_dependencies: ["mypy", "types-PyYAML"]
        types: [python]
        files: ^proxy/
