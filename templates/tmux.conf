# devbox tmux configuration.

# Use 256 colors.
set -g default-terminal "tmux-256color"

# Start window numbering at 1.
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed.
set -g renumber-windows on

# Increase scrollback buffer.
set -g history-limit 50000

# Status bar.
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour214,bold] devbox #[fg=colour248]| "
set -g status-left-length 20
set -g status-right "#[fg=colour248]%H:%M "
set -g status-right-length 20

# Pane borders.
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour214"

# Mouse support.
set -g mouse on

# Allow OSC escape sequences to pass through to the outer terminal (cmux).
# Without this, devbox-notify (OSC 777 notifications) are silently stripped.
set -g allow-passthrough on

# Faster key repetition.
set -sg escape-time 10

# Split panes with | and -.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
